# This workflow follows clean-infra-pro's own rules: least-privilege
# permissions, SHA-pinned actions, no untrusted interpolation, plain
# pull_request (never pull_request_target).
name: verify-skills

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Verify skill links, frontmatter, and shared stats
        run: node scripts/verify-skills.mjs
